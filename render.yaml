services:
  - type: web
    name: genshin-farm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: genshin-farm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: genshin-farm-db
    databaseName: genshin_farm
    user: genshin_user
    plan: free