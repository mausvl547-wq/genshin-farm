<!-- Форма добавления пользователя -->
<div class="card p-3 mb-4">
    <h4><i class="bi bi-person-plus"></i> Добавить качера</h4>
    <form method="POST" action="{{ url_for('add_user') }}" class="row g-3">
        <div class="col-md-5">
            <input type="email" name="email" class="form-control" placeholder="Email пользователя" required>
        </div>
        <div class="col-md-5">
            <input type="text" name="username" class="form-control" placeholder="Имя (никнейм)" required>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-genshin w-100">➕ Создать</button>
        </div>
    </form>
    <small class="text-muted mt-2">⚠️ После создания пароль отобразится здесь — сохраните его и передайте пользователю</small>
</div>

<!-- Таблица пользователей -->
<h4>👥 Все пользователи</h4>
<div class="table-responsive">
    <table class="table table-dark table-hover">
        <thead>
            <tr><th>Email</th><th>Никнейм</th><th>Заработано</th><th>К выплате</th><th>Действия</th></tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.email }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.total_earned }}₽</td>
                <td class="{% if u.balance > 0 %}text-success{% endif %}">{{ u.balance }}₽</td>
                <td>
                    <a href="{{ url_for('reset_password', user_id=u.id) }}" class="btn btn-sm btn-warning">🔄 Сброс пароля</a>
                    <a href="{{ url_for('delete_user', user_id=u.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">🗑️</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
